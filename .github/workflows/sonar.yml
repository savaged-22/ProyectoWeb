name: SonarCloud

on:
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: mvn clean verify
        working-directory: lulo-starter/backend

      - name: SonarCloud Scan
        run: mvn sonar:sonar \
          -Dsonar.projectKey=proyectoweb-backend \
          -Dsonar.organization=samuelmontealegre \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        working-directory: lulo-starter/backend