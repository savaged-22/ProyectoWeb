name: Build and Deploy ProyectoWeb

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Replace with your actual GitHub username/repo
  IMAGE_BACKEND: ${{ github.repository_owner }}/proyectoweb-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/proyectoweb-frontend
  K8S_NAMESPACE: proyectoweb

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./lulo-starter/backend
          file: ./lulo-starter/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

  build-and-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step to handle the missing package.json for now - or a basic build
      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./lulo-starter/frontend
          # We expect a Dockerfile here as well
          file: ./lulo-starter/frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deployment with Helm or Manifests
        run: |
          # We replace placeholder images in deployment.yaml
          BACKEND_IMG="${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest"
          FRONTEND_IMG="${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest"
          
          sed "s|proyectoweb-backend:latest|$BACKEND_IMG|g; s|proyectoweb-frontend:latest|$FRONTEND_IMG|g" deployment.yaml | kubectl apply -f -
