name: Build and Deploy with MicroK8s (ProyectoWeb)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: proyectoweb-backend
  IMAGE_FRONTEND: proyectoweb-frontend
  K8S_NAMESPACE: grupo12

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Tests unitarios + cobertura
  # ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('lulo-starter/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: lulo-starter/backend
        run: mvn clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: lulo-starter/backend/target/surefire-reports/

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: lulo-starter/backend/target/site/jacoco/

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Build y push de imágenes a GHCR
  # ──────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set OWNER_LC
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:latest \
            -t ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            ./lulo-starter/backend
          docker push ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:latest
          docker push ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build and Push Frontend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:latest \
            -t ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
            ./lulo-starter/frontend
          docker push ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:latest
          docker push ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  # ──────────────────────────────────────────────────────────────
  # JOB 3: Deploy en MicroK8s (self-hosted runner)
  # ──────────────────────────────────────────────────────────────
  deploy-onpremise:
    name: Deploy on MicroK8s On-Premise
    runs-on: main
    needs: build-and-publish

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set OWNER_LC
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Apply Kubernetes manifests
        run: |
          BACKEND_IMG="${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}"
          FRONTEND_IMG="${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}"

          sed \
            -e "s|__BACKEND_IMAGE__|${BACKEND_IMG}|g" \
            -e "s|__FRONTEND_IMAGE__|${FRONTEND_IMG}|g" \
            lulo-starter/k8s/deployment.yml \
            | sudo microk8s kubectl apply -n ${{ env.K8S_NAMESPACE }} -f -

      - name: Wait for rollout
        run: |
          sudo microk8s kubectl rollout status deployment/proyectoweb-backend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          sudo microk8s kubectl rollout status deployment/proyectoweb-frontend \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s
