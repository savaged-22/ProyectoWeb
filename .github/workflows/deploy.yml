name: Build and Deploy with MicroK8s (ProyectoWeb)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Ajustar estos nombres según sea necesario
  IMAGE_BACKEND: proyectoweb-backend
  IMAGE_FRONTEND: proyectoweb-frontend
  K8S_NAMESPACE: grupo12

jobs:
  build-and-publish:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set OWNER_LC
      run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend
      run: |
        docker build -t ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:latest ./lulo-starter/backend
        docker push ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:latest

    - name: Build and Push Frontend
      run: |
        docker build -t ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:latest ./lulo-starter/frontend
        docker push ${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:latest

  deploy-onpremise:
    name: Deploy on MicroK8s On-Premise
    # 'runs-on: main' sugiere que tienes un runner propio (self-hosted) configurado con ese label. 
    # Si quieres usar los corredores de GitHub estándar, usa 'ubuntu-latest', pero
    # para ejecutar comandos 'microk8s kubectl' locales se requiere el runner self-hosted.
    runs-on: main 
    needs: build-and-publish

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set OWNER_LC
      run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Apply Kubernetes deployment
      run: |
        # Reemplazamos las etiquetas de imagen en el archivo de despliegue antes de aplicar
        BACKEND_IMG="${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_BACKEND }}:latest"
        FRONTEND_IMG="${{ env.REGISTRY }}/${OWNER_LC}/${{ env.IMAGE_FRONTEND }}:latest"
        
        sed "s|proyectoweb-backend:latest|$BACKEND_IMG|g; s|proyectoweb-frontend:latest|$FRONTEND_IMG|g" deployment.yaml | sudo microk8s kubectl apply -f -

    - name: Restart Kubernetes deployment
      run: |
        sudo microk8s kubectl rollout restart deployment/proyectoweb-backend -n ${{ env.K8S_NAMESPACE }}
        sudo microk8s kubectl rollout restart deployment/proyectoweb-frontend -n ${{ env.K8S_NAMESPACE }}
