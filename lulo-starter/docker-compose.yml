services:

  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-lulo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-lulo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lulo_user} -d ${DB_NAME:-lulo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lulo-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - remote-db.env
    networks:
      - lulo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - lulo-net

  sonarqube:
    profiles: ["sonar"]
    image: sonarqube:10-community
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: ${SPRING_DATASOURCE_URL}
      SONAR_JDBC_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SONAR_JDBC_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - lulo-net

networks:
  lulo-net:
    driver: bridge

volumes:
  db_data:
  sonar_data:
  sonar_logs:
