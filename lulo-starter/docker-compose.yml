services:

  # ── Base de datos local (solo para desarrollo sin DB remota) ──────────────
  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-lulo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-lulo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lulo_user} -d ${DB_NAME:-lulo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lulo-net

  # ── Backend monolítico Spring Boot ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - remote-db.env
    restart: on-failure
    ports:
      - "8080:8080"
    networks:
      - lulo-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/swagger-ui/index.html > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 40s

  # ── Frontend Angular servido con SSR (Node.js) ────────────────────────────
  frontend:
    build:
      context: ./frontend_final
      dockerfile: Dockerfile
    ports:
      - "4200:4000"
    depends_on:
      - backend
    networks:
      - lulo-net

  # ── PostgreSQL exclusivo para SonarQube (no comparte la DB de la app) ────
  sonar-db:
    profiles: ["sonar"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lulo-net

  # ── InfluxDB: recibe métricas de JMeter en tiempo real ───────────────────
  influxdb:
    profiles: ["monitoring"]
    image: influxdb:1.8-alpine
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: jmeter
      INFLUXDB_USER: jmeter
      INFLUXDB_USER_PASSWORD: jmeter123
      INFLUXDB_ADMIN_ENABLED: "true"
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD-SHELL", "influx -execute 'SHOW DATABASES' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lulo-net

  # ── Grafana: dashboard visual de carga (tiempo real) ─────────────────────
  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATASOURCES_DEFAULT_NAME: InfluxDB
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - lulo-net

  # ── SonarQube (solo con perfil sonar) ────────────────────────────────────
  # Requisito del host antes de levantar:
  #   sudo sysctl -w vm.max_map_count=262144
  sonarqube:
    profiles: ["sonar"]
    image: sonarqube:10-community
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    networks:
      - lulo-net

networks:
  lulo-net:
    driver: bridge

volumes:
  db_data:
  sonar_db_data:
  sonar_data:
  sonar_logs:
  sonar_extensions:
  influxdb_data:
  grafana_data:
