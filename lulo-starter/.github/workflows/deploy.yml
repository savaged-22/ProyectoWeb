name: Build and Deploy with MicroK8s

on:
  push:
    branches: [main]

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build y push de la imagen del backend a GHCR
  # ──────────────────────────────────────────────────────────────
  build-and-publish:
    name: Build and Push Image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Mostrar rama actual
        run: echo "Rama actual:${{ github.ref }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set OWNER_LC
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GHCR access
        run: docker pull ghcr.io/${OWNER_LC}/proyectoweb-backend:latest || true

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${OWNER_LC}/proyectoweb-backend:latest \
            ./backend

      - name: Push Docker image
        run: docker push ghcr.io/${OWNER_LC}/proyectoweb-backend:latest

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Deploy en MicroK8s On-Premise (self-hosted runner)
  # ──────────────────────────────────────────────────────────────
  deploy-onpremise:
    name: Deploy on MicroK8s On-Premise
    runs-on: main
    needs: build-and-publish

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set OWNER_LC
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Apply Kubernetes deployment
        run: |
          BACKEND_IMG="ghcr.io/${OWNER_LC}/proyectoweb-backend:latest"
          sed -e "s|__BACKEND_IMAGE__|${BACKEND_IMG}|g" \
            k8s/deployment.yml \
            | sudo microk8s kubectl apply -n grupo12 -f -

      - name: Restart deployment
        run: |
          sudo microk8s kubectl rollout restart deployment/proyectoweb-backend -n grupo12
