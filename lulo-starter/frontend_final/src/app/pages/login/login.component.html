<div class="login-container">
  <div class="login-box glass-panel">
    <div class="logo-wrapper">
      <a routerLink="/" class="logo">
        <span class="lulo">Lulo</span><span class="starter">Starter</span>
      </a>
    </div>
    
    <h2>Bienvenido de vuelta</h2>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>
    
    <form class="login-form" (submit)="onSubmit($event)">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="tu@correo.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>

      <div *ngIf="errorMsg()" style="color: #ff5555; background: rgba(255, 0, 0, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; border: 1px solid rgba(255, 0, 0, 0.3);">
        {{ errorMsg() }}
      </div>
      
      <div class="form-options">
        <label class="remember">
          <input type="checkbox"> Recordarme
        </label>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
      
      <button type="submit" class="btn-primary full-width" [disabled]="loading()">
        {{ loading() ? 'Iniciando...' : 'Iniciar Sesión' }}
      </button>
    </form>
    
    <div class="register-prompt">
      <p>¿No tienes una cuenta? <a href="#">Regístrate aquí</a></p>
    </div>
  </div>
</div>
