# Aplicar manualmente UNA VEZ en el cluster:
#   sudo microk8s kubectl apply -n grupo12 -f k8s/secret.yml
#
# Los valores deben estar en base64:
#   echo -n "valor" | base64
apiVersion: v1
kind: Secret
metadata:
  name: lulo-backend-secret
type: Opaque
data:
  SPRING_DATASOURCE_URL: <base64_de_la_url>
  SPRING_DATASOURCE_USERNAME: <base64_del_usuario>
  SPRING_DATASOURCE_PASSWORD: <base64_del_password>
  JWT_SECRET: <base64_del_jwt_secret>
  JWT_EXPIRATION_MINUTES: MTIw
  SERVER_PORT: ODA4MA==
