# ─────────────────────────────────────────────────────────────────
# Backend
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyectoweb-backend
  namespace: grupo12
  labels:
    app: proyectoweb-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proyectoweb-backend
  template:
    metadata:
      labels:
        app: proyectoweb-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: proyectoweb-backend
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: lulo-backend-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: proyectoweb-backend-service
  namespace: grupo12
  labels:
    app: proyectoweb-backend
spec:
  selector:
    app: proyectoweb-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
# ─────────────────────────────────────────────────────────────────
# Ingress: expone backend en /api
# ─────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proyectoweb-backend-ingress
  namespace: grupo12
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: public
  rules:
    - host: grupo12.inphotech.co
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: proyectoweb-backend-service
                port:
                  number: 8080
