apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyectoweb-frontend
  labels:
    app: proyectoweb-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proyectoweb-frontend
  template:
    metadata:
      labels:
        app: proyectoweb-frontend
    spec:
      containers:
        - name: proyectoweb-frontend
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: proyectoweb-frontend-service
  labels:
    app: proyectoweb-frontend
spec:
  selector:
    app: proyectoweb-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
